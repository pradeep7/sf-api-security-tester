# === SHARED ANCHORS ===
_common_execution: &common_execution
  requires_human_approval: false
  maximum_requests: 5
  state_changing: false

_common_evidence: &common_evidence
  - baseline_request
  - baseline_response
  - negative_request
  - negative_response
  - tested_role
  - correlation_id

_domain1_meta: &domain1_meta
  domain: "Identity, Authentication & Session"

_domain2_meta: &domain2_meta
  domain: "Record & Tenant Access (BOLA / IDOR)"


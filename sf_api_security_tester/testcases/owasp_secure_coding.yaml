# =============================================================================
# OWASP Secure Coding Practices Quick Reference Guide (v2) - Test Case Definitions
# =============================================================================
# Official 13 categories:
#   SCP-01: Input Validation
#   SCP-02: Output Encoding
#   SCP-03: Authentication
#   SCP-04: Session Management
#   SCP-05: Access Control
#   SCP-06: Cryptographic Practices
#   SCP-07: Error Handling and Logging
#   SCP-08: Data Protection and Privacy
#   SCP-09: Communications Security
#   SCP-10: System Configuration
#   SCP-11: Database Security
#   SCP-12: File Management
#   SCP-13: Memory Management

test_cases:

  # ===========================================================================
  # Input Validation
  # ===========================================================================
  - id: "SCP-01-001"
    name: "Input Validation - SQL/NoSQL Injection via Query Parameter"
    owasp_mapping:
      category: "SCP-01"
      name: "Input Validation"
    applicable_categories:
      - "data_query"
      - "business_logic"
    severity: "Critical"
    mutation_type: "soql_injection"
    payloads:
      injection_payloads:
        - "' OR '1'='1"
        - "'; DROP TABLE Account--"
        - "1; SELECT * FROM User WHERE 1=1"
        - "admin'--"
        - "' UNION SELECT null,null,null,null--"
    expected_secure_behavior: "Input validation rejects malicious payloads"
    finding_criteria:
      status_codes: [200]
      response_must_not_contain:
        - "records"
        - "attributes"
        - "totalSize"
      description: "Query accepts injection payloads without validation"

  - id: "SCP-02-001"
    name: "Output Encoding - XSS via API Response"
    owasp_mapping:
      category: "SCP-02"
      name: "Output Encoding"
    applicable_categories:
      - "user_data_crud"
      - "business_logic"
    severity: "High"
    mutation_type: "xss_injection"
    payloads:
      xss_payloads:
        - '<script>alert("XSS")</script>'
        - '<img src=x onerror=alert(1)>'
        - '"><script>alert(document.cookie)</script>'
        - 'javascript:alert(1)'
        - '<svg/onload=alert(1)>'
        - '{{7*7}}'
        - '${7*7}'
      injection_fields:
        - "Subject"
        - "Description"
        - "Name"
        - "CommentBody"
        - "Title"
    expected_secure_behavior: "Input is sanitized or output is encoded"
    finding_criteria:
      response_must_not_contain:
        - '<script>alert'
        - 'onerror='
        - 'javascript:'
      description: "API accepts or reflects XSS payloads without encoding"

  - id: "SCP-01-002"
    name: "Input Validation - Buffer Overflow via Large Payload"
    owasp_mapping:
      category: "SCP-01"
      name: "Input Validation"
    applicable_categories:
      - "user_data_crud"
      - "file_upload"
    severity: "Medium"
    mutation_type: "resource_exhaustion"
    payloads:
      description: "Send extremely large field values"
      large_payloads:
        - field_length: 100000
        - field_length: 1000000
        - file_size_mb: 100
    expected_secure_behavior: "413 or 400 with size limit error"
    finding_criteria:
      status_codes: [200, 201, 204]
      description: "Endpoint accepts oversized payloads"

  - id: "SCP-01-003"
    name: "Input Validation - Special Characters in SOQL"
    owasp_mapping:
      category: "SCP-01"
      name: "Input Validation"
    applicable_categories:
      - "data_query"
    severity: "Medium"
    mutation_type: "soql_injection"
    payloads:
      special_characters:
        - "\\"
        - "'"
        - '"'
        - ";"
        - "--"
        - "/*"
        - "*/"
        - "%00"
        - "\n"
        - "\r"
    expected_secure_behavior: "Proper escaping or rejection of special characters"
    finding_criteria:
      status_codes: [200]
      description: "Special characters not properly handled in SOQL"

  # ===========================================================================
  # Output Encoding / Stored XSS
  # ===========================================================================
  - id: "SCP-02-002"
    name: "Output Encoding - Stored XSS via Create"
    owasp_mapping:
      category: "SCP-02"
      name: "Output Encoding"
    applicable_categories:
      - "user_data_crud"
      - "business_logic"
    severity: "High"
    mutation_type: "stored_xss"
    payloads:
      xss_payloads:
        - '<script>alert("Stored XSS")</script>'
        - '<img src=x onerror=alert(document.cookie)>'
      target_objects:
        - "Case"
        - "Account"
        - "Contact"
        - "FeedItem"
    expected_secure_behavior: "Stored content is HTML-encoded on retrieval"
    finding_criteria:
      response_must_not_contain:
        - '<script>alert'
        - 'onerror='
      description: "Stored XSS payload reflected without encoding"

  # ===========================================================================
  # Data Protection / PII Exposure
  # ===========================================================================
  - id: "SCP-08-001"
    name: "Data Protection and Privacy - PII in API Response"
    owasp_mapping:
      category: "SCP-08"
      name: "Data Protection and Privacy"
    applicable_categories:
      - "data_query"
      - "user_data_crud"
      - "tenant_isolation"
    severity: "High"
    mutation_type: "pii_check"
    payloads:
      pii_fields:
        - "Email"
        - "Phone"
        - "MobilePhone"
        - "HomePhone"
        - "MailingAddress"
        - "OtherAddress"
        - "SSN__c"
        - "Credit_Card__c"
        - "DateOfBirth__c"
        - "DriverLicense__c"
      description: "Check if PII is exposed in responses to unauthorized users"
    expected_secure_behavior: "PII fields masked or excluded based on FLS/CLS"
    finding_criteria:
      description: "PII data exposed without field-level security enforcement"

  - id: "SCP-08-002"
    name: "Data Protection and Privacy - Sensitive Data in Logs/Headers"
    owasp_mapping:
      category: "SCP-08"
      name: "Data Protection and Privacy"
    applicable_categories:
      - "authentication"
      - "data_query"
    severity: "Medium"
    mutation_type: "header_check"
    payloads:
      sensitive_header_patterns:
        - "X-SFDC-Request-Id"
        - "X-B3-TraceId"
        - "Server"
        - "X-Powered-By"
      description: "Check for sensitive information in response headers"
    expected_secure_behavior: "Sensitive server info not exposed in headers"
    finding_criteria:
      description: "Response headers leak server implementation details"

  # ===========================================================================
  # Authentication & Session Management
  # ===========================================================================
  - id: "SCP-03-001"
    name: "Authentication - Token in URL Parameter"
    owasp_mapping:
      category: "SCP-03"
      name: "Authentication"
    applicable_categories:
      - "authentication"
    severity: "High"
    mutation_type: "session_fixation"
    payloads:
      description: "Check if auth token can be passed via URL"
      url_params:
        - "access_token={token}"
        - "sid={token}"
        - "session={token}"
    expected_secure_behavior: "URL parameters not accepted for authentication"
    finding_criteria:
      status_codes: [200, 302]
      description: "Authentication token accepted via URL parameter"

  - id: "SCP-03-002"
    name: "Authentication - Weak Password Policy (Registration)"
    owasp_mapping:
      category: "SCP-03"
      name: "Authentication"
    applicable_categories:
      - "authentication"
    severity: "Medium"
    mutation_type: "auth_enumeration"
    payloads:
      description: "Test registration/login with weak passwords"
      weak_passwords:
        - "password"
        - "123456"
        - "admin"
        - "test"
        - "a"
    expected_secure_behavior: "Weak passwords rejected"
    finding_criteria:
      status_codes: [200, 201]
      description: "Weak password accepted by the system"

  # ===========================================================================
  # Access Control
  # ===========================================================================
  - id: "SCP-05-001"
    name: "Access Control - Horizontal Privilege Escalation"
    owasp_mapping:
      category: "SCP-05"
      name: "Access Control"
    applicable_categories:
      - "user_data_crud"
      - "data_query"
      - "tenant_isolation"
    severity: "Critical"
    mutation_type: "bola_id_swap"
    payloads:
      description: "Access resources of another user at the same privilege level"
      swaps:
        - field: "url_path_record_id"
          from_hint: "current_user_record_id"
          to_hint: "other_user_record_id"
    expected_secure_behavior: "403 Forbidden for cross-user access"
    finding_criteria:
      status_codes: [200, 201]
      description: "Horizontal privilege escalation possible"

  - id: "SCP-05-002"
    name: "Access Control - Vertical Privilege Escalation"
    owasp_mapping:
      category: "SCP-05"
      name: "Access Control"
    applicable_categories:
      - "admin_operations"
    severity: "Critical"
    mutation_type: "method_override"
    payloads:
      description: "Attempt admin operations with user token"
      method_override_headers:
        - "X-HTTP-Method-Override"
        - "X-HTTP-Method"
    expected_secure_behavior: "403 Forbidden for admin operations"
    finding_criteria:
      status_codes: [200, 201, 204]
      description: "Vertical privilege escalation via method override"

  # ===========================================================================
  # Error Handling
  # ===========================================================================
  - id: "SCP-07-001"
    name: "Error Handling and Logging - Verbose Error Messages"
    owasp_mapping:
      category: "SCP-07"
      name: "Error Handling and Logging"
    applicable_categories:
      - "authentication"
      - "data_query"
      - "user_data_crud"
    severity: "Medium"
    mutation_type: "error_enumeration"
    payloads:
      malformed_requests:
        - type: "invalid_json"
          body: "not json at all"
        - type: "empty_body"
          body: ""
        - type: "wrong_content_type"
          content_type: "text/plain"
          body: "test"
        - type: "missing_fields"
          body: "{}"
    expected_secure_behavior: "Generic error message without stack traces"
    finding_criteria:
      response_must_not_contain:
        - "Exception"
        - "stack trace"
        - "apex"
        - "soql"
        - "sosl"
        - "AuraHandledException"
        - "System."
        - "Class."
        - ".line "
      description: "Error response leaks implementation details"

  # ===========================================================================
  # Business Logic
  # ===========================================================================
  - id: "SCP-04-001"
    name: "Session Management - Race Condition in Balance Update"
    owasp_mapping:
      category: "SCP-04"
      name: "Session Management"
    applicable_categories:
      - "business_logic"
    severity: "High"
    mutation_type: "race_condition"
    payloads:
      description: "Concurrent requests to test race condition"
      concurrent_requests: 10
      target_operation: "balance_update"
    expected_secure_behavior: "Proper locking/serialization of balance operations"
    finding_criteria:
      status_codes: [200, 201]
      description: "Race condition allows double-spending or data corruption"

  - id: "SCP-04-002"
    name: "Session Management - Negative Quantity/Amount Abuse"
    owasp_mapping:
      category: "SCP-04"
      name: "Session Management"
    applicable_categories:
      - "business_logic"
    severity: "Medium"
    mutation_type: "business_logic_bypass"
    payloads:
      negative_values:
        - field: "Quantity"
          value: -1
        - field: "Amount"
          value: -1000
        - field: "UnitPrice"
          value: -50
        - field: "Discount"
          value: 100
        - field: "Discount"
          value: 999
    expected_secure_behavior: "Server validates positive values and reasonable ranges"
    finding_criteria:
      status_codes: [200, 201, 204]
      description: "Negative values accepted in business-critical fields"

  # ===========================================================================
  # Cryptography
  # ===========================================================================
  - id: "SCP-06-001"
    name: "Cryptographic Practices - TLS Version Check"
    owasp_mapping:
      category: "SCP-06"
      name: "Cryptographic Practices"
    applicable_categories:
      - "authentication"
      - "data_query"
      - "user_data_crud"
    severity: "Medium"
    mutation_type: "transport_check"
    payloads:
      description: "Check TLS version support"
      check_tls_versions: true
    expected_secure_behavior: "TLS 1.2+ required"
    finding_criteria:
      description: "Server accepts TLS 1.0 or 1.1 connections"

  - id: "SCP-06-002"
    name: "Cryptographic Practices - Weak Cipher Suites"
    owasp_mapping:
      category: "SCP-06"
      name: "Cryptographic Practices"
    applicable_categories:
      - "authentication"
    severity: "Low"
    mutation_type: "transport_check"
    payloads:
      description: "Check for weak cipher suites"
      weak_ciphers:
        - "RC4"
        - "DES"
        - "3DES"
        - "NULL"
        - "EXPORT"
    expected_secure_behavior: "Only strong cipher suites accepted"
    finding_criteria:
      description: "Server accepts weak cipher suites"

  # ===========================================================================
  # SSRF (Cross-cutting — aligns with API7 + A10)
  # ===========================================================================
  - id: "SCP-09-001"
    name: "Communications Security - SSRF via API Parameter"
    owasp_mapping:
      category: "SCP-09"
      name: "Communications Security"
    applicable_categories:
      - "business_logic"
    severity: "High"
    mutation_type: "ssrf_injection"
    payloads:
      internal_targets:
        - "http://169.254.169.254/latest/meta-data/"
        - "http://169.254.169.254/latest/meta-data/iam/security-credentials/"
        - "http://localhost:8080"
        - "http://127.0.0.1:3306"
        - "http://[::1]"
        - "http://0177.0.0.1"
        - "http://0x7f000001"
      injection_fields:
        - "url"
        - "website"
        - "callback_url"
        - "redirect_url"
        - "image_url"
        - "document_url"
    expected_secure_behavior: "Server-side request is blocked or URL is sanitized"
    finding_criteria:
      status_codes: [200, 201, 202]
      response_must_not_contain:
        - "ami-id"
        - "instance-id"
        - "iam"
        - "security-credentials"
      description: "SSRF allows server to access internal resources"

  # ===========================================================================
  # SCP-10: System Configuration
  # ===========================================================================
  - id: "SCP-10-001"
    name: "System Configuration - Default Credentials and Settings"
    owasp_mapping:
      category: "SCP-10"
      name: "System Configuration"
    applicable_categories:
      - "authentication"
      - "admin_operations"
    severity: "Medium"
    mutation_type: "auth_enumeration"
    payloads:
      description: "Test for default credentials and insecure system configurations"
      weak_passwords:
        - "admin"
        - "password"
        - "salesforce"
        - "changeme"
    expected_secure_behavior: "Default credentials rejected; secure configuration enforced"
    finding_criteria:
      status_codes: [200, 201]
      description: "System accepts default or weak credentials"

  - id: "SCP-10-002"
    name: "System Configuration - Unnecessary Services and Features"
    owasp_mapping:
      category: "SCP-10"
      name: "System Configuration"
    applicable_categories:
      - "admin_operations"
      - "user_data_crud"
    severity: "Low"
    mutation_type: "version_enumeration"
    payloads:
      description: "Check for unnecessary API versions or deprecated endpoints still accessible"
      version_swaps:
        - "v30.0"
        - "v35.0"
        - "v40.0"
    expected_secure_behavior: "Deprecated versions return 404 or redirect"
    finding_criteria:
      status_codes: [200, 201]
      description: "Deprecated API versions or unnecessary services still accessible"

  # ===========================================================================
  # SCP-11: Database Security
  # ===========================================================================
  - id: "SCP-11-001"
    name: "Database Security - SOQL Injection Data Extraction"
    owasp_mapping:
      category: "SCP-11"
      name: "Database Security"
    applicable_categories:
      - "data_query"
    severity: "Critical"
    mutation_type: "soql_injection"
    payloads:
      soql_payloads:
        - "' OR '1'='1"
        - "' UNION SELECT Id,Name,Email FROM User--"
        - "'; SELECT * FROM User WHERE 1=1--"
    expected_secure_behavior: "SOQL injection blocked; query returns error or empty results"
    finding_criteria:
      status_codes: [200]
      response_must_not_contain:
        - "records"
        - "attributes"
        - "totalSize"
      description: "SOQL injection bypasses database security controls"

  - id: "SCP-11-002"
    name: "Database Security - Excessive Data Exposure via Query"
    owasp_mapping:
      category: "SCP-11"
      name: "Database Security"
    applicable_categories:
      - "data_query"
      - "user_data_crud"
    severity: "High"
    mutation_type: "resource_exhaustion"
    payloads:
      description: "Test if queries can extract excessive data beyond authorization"
      soql_modifications:
        - "SELECT Id,Name,Email,Phone,Title FROM Contact LIMIT 10000"
    expected_secure_behavior: "Query limited by FLS/CLS; excessive data blocked"
    finding_criteria:
      status_codes: [200]
      description: "Query returns excessive data beyond authorized scope"

  # ===========================================================================
  # SCP-12: File Management
  # ===========================================================================
  - id: "SCP-12-001"
    name: "File Management - Path Traversal via File Upload"
    owasp_mapping:
      category: "SCP-12"
      name: "File Management"
    applicable_categories:
      - "file_upload"
    severity: "High"
    mutation_type: "path_traversal"
    payloads:
      traversal_payloads:
        - "../../../etc/passwd"
        - "....//....//....//etc/passwd"
        - "%2e%2e%2f%2e%2e%2f%2e%2e%2fetc%2fpasswd"
      injection_points:
        - "file_name_param"
    expected_secure_behavior: "Path traversal blocked; file access denied"
    finding_criteria:
      status_codes: [200]
      response_must_not_contain:
        - "root:x:0:0"
      description: "File upload allows path traversal to access system files"

  - id: "SCP-12-002"
    name: "File Management - Unrestricted File Type Upload"
    owasp_mapping:
      category: "SCP-12"
      name: "File Management"
    applicable_categories:
      - "file_upload"
    severity: "Medium"
    mutation_type: "path_traversal"
    payloads:
      description: "Test if dangerous file types can be uploaded"
      traversal_payloads:
        - "test.exe"
        - "test.php"
        - "test.jsp"
      injection_points:
        - "file_name_param"
    expected_secure_behavior: "Dangerous file types rejected by validation"
    finding_criteria:
      status_codes: [200, 201]
      description: "System accepts dangerous file types without validation"

  # ===========================================================================
  # SCP-13: Memory Management
  # ===========================================================================
  - id: "SCP-13-001"
    name: "Memory Management - Buffer Overflow via Oversized Payload"
    owasp_mapping:
      category: "SCP-13"
      name: "Memory Management"
    applicable_categories:
      - "user_data_crud"
      - "data_query"
    severity: "Medium"
    mutation_type: "resource_exhaustion"
    payloads:
      description: "Send extremely large payloads to test buffer handling"
      large_payloads:
        - field_length: 100000
        - field_length: 500000
    expected_secure_behavior: "413 or 400 with size limit; no memory corruption"
    finding_criteria:
      status_codes: [200, 201, 204]
      description: "System accepts oversized payloads without proper memory management"
